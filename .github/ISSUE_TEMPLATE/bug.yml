name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels:
  - "type: bug"
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private tenant data, or vulnerability details. Use private security reporting for vulnerabilities.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide minimal, deterministic steps and sanitized input.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Mention tenant isolation, evaluation correctness, propagation, or availability impact.

